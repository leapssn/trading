<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' },
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body id="appBody" class="bg-[#151726] text-slate-200 min-h-screen flex transition-colors duration-200">

  <!-- ═══════════════════════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="w-64 sidebar flex flex-col shrink-0">
    <!-- Logo -->
    <div class="px-6 py-5 border-b sidebar-border">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <span class="text-2xl">📈</span>
        <span class="sidebar-title">TradingLog</span>
      </h1>
    </div>

    <!-- Journal selector -->
    <div class="px-4 py-4 border-b sidebar-border">
      <label class="form-label">Journal actif</label>
      <div class="flex gap-2 mt-1">
        <select id="journalSelector" class="flex-1 form-input text-sm"></select>
        <button onclick="App.openModal('journalModal')" title="Nouveau journal"
          class="bg-brand hover:bg-brand-dark text-white px-3 py-2 rounded-lg text-sm font-bold transition">+</button>
        <button onclick="Journals.remove(Journals.activeId())" title="Supprimer ce journal"
          class="text-slate-500 hover:text-red-400 px-2 py-2 rounded-lg text-sm transition border sidebar-border hover:border-red-500/50">🗑️</button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="#dashboard"   class="nav-link" data-page="dashboard">   <span>🏠</span> Dashboard      </a>
      <a href="#journal"     class="nav-link" data-page="journal">     <span>📒</span> Journal        </a>
      <a href="#strategies"  class="nav-link" data-page="strategies">  <span>🧠</span> Stratégies     </a>
      <a href="#calendar"    class="nav-link" data-page="calendar">    <span>🕐</span> Sessions       </a>
      <a href="#economics"   class="nav-link" data-page="economics">   <span>📰</span> Économie       </a>
      <a href="#notebook"    class="nav-link" data-page="notebook">    <span>📝</span> Bloc-notes     </a>
    </nav>

    <!-- Theme toggle + footer -->
    <div class="px-4 py-3 border-t sidebar-border flex items-center justify-between">
      <span class="text-xs text-slate-500">Données locales</span>
      <button id="themeToggle" onclick="Theme.toggle()" title="Changer le thème"
        class="text-slate-400 hover:text-white transition text-lg leading-none px-2 py-1 rounded-lg hover:bg-white/10">🌙</button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════
       MAIN
  ════════════════════════════════════════════════════════ -->
  <main class="flex-1 overflow-auto main-bg">
    <div id="page-dashboard"  class="page hidden"></div>
    <div id="page-journal"    class="page hidden"></div>
    <div id="page-strategies" class="page hidden"></div>
    <div id="page-calendar"   class="page hidden"></div>
    <div id="page-economics"  class="page hidden"></div>
    <div id="page-notebook"   class="page hidden"></div>
  </main>

  <!-- ═══════════════════════════════════════════════════════
       MODAL — Nouveau Journal
  ════════════════════════════════════════════════════════ -->
  <div id="journalModal" class="modal-backdrop hidden">
    <div class="modal-box w-[420px]">
      <h2 class="text-lg font-semibold modal-title mb-5">Nouveau Journal</h2>
      <div class="space-y-4">

        <div>
          <label class="form-label">Nom du journal</label>
          <input id="jName" type="text" placeholder="Ex: Compte Principal" class="form-input" />
        </div>

        <div>
          <label class="form-label">Type de compte</label>
          <select id="jType" class="form-input" onchange="JournalModal.onTypeChange()">
            <option value="real">💼 Compte Réel</option>
            <option value="prop">🏦 Prop Firm</option>
            <option value="demo">🧪 Démo</option>
          </select>
        </div>

        <!-- Capital de départ (commun à tous) -->
        <div>
          <label class="form-label">Capital de départ ($)</label>
          <input id="jCapital" type="number" min="0" placeholder="Ex: 10 000" class="form-input" />
        </div>

        <!-- Champs spécifiques Prop Firm -->
        <div id="propSection" class="hidden space-y-4 p-4 rounded-xl border border-yellow-500/30 bg-yellow-500/5">
          <p class="text-xs text-yellow-400 font-semibold uppercase tracking-wider">Règles Prop Firm</p>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="form-label">Drawdown max total (%)</label>
              <input id="jDrawdown" type="number" min="0" step="0.1" placeholder="Ex: 10" class="form-input" />
            </div>
            <div>
              <label class="form-label">Perte max / jour (%)</label>
              <input id="jDailyLoss" type="number" min="0" step="0.1" placeholder="Ex: 5" class="form-input" />
            </div>
          </div>
          <div>
            <label class="form-label">Objectif de profit (%)</label>
            <input id="jTarget" type="number" min="0" step="0.1" placeholder="Ex: 8" class="form-input" />
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-6 justify-end">
        <button onclick="App.closeModal('journalModal')" class="btn-secondary">Annuler</button>
        <button onclick="Journals.create()" class="btn-primary">Créer</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MODAL — Nouveau Trade
  ════════════════════════════════════════════════════════ -->
  <div id="tradeModal" class="modal-backdrop hidden">
    <div class="modal-box w-[640px]">
      <h2 class="text-lg font-semibold modal-title mb-5" id="tradeModalTitle">Nouveau Trade</h2>
      <input type="hidden" id="tradeId" />

      <div class="grid grid-cols-2 gap-3">
        <!-- Date -->
        <div>
          <label class="form-label">Date / Heure</label>
          <input id="tDate" type="datetime-local" class="form-input" />
        </div>

        <!-- Sens -->
        <div>
          <label class="form-label">Sens</label>
          <select id="tSide" class="form-input" onchange="Trades.recalcPnL()">
            <option value="buy">▲ Achat (Long)</option>
            <option value="sell">▼ Vente (Short)</option>
          </select>
        </div>

        <!-- Actif — liste complète -->
        <div class="col-span-2">
          <label class="form-label">Actif</label>
          <div class="flex gap-2">
            <select id="tAsset" class="flex-1 form-input" onchange="Trades.recalcPnL()">
              <option value="">— Sélectionner un instrument —</option>
            </select>
            <!-- Champ libre pour un actif non listé -->
            <input id="tAssetCustom" type="text" placeholder="Autre…"
              class="form-input w-32 text-sm" oninput="Trades.onCustomAsset(this)"
              title="Entrer un actif non listé" />
          </div>
        </div>

        <!-- Taille -->
        <div>
          <label class="form-label" id="tSizeLabel">Taille (lots / unités)</label>
          <input id="tSize" type="number" step="any" min="0" placeholder="0.10" class="form-input"
            oninput="Trades.recalcPnL()" />
        </div>

        <!-- Émotion -->
        <div>
          <label class="form-label">Émotions</label>
          <select id="tEmotion" class="form-input">
            <option value="">-- Sélectionner --</option>
            <option value="calm">😌 Calme / Confiant</option>
            <option value="fear">😰 Peur / Hésitation</option>
            <option value="greed">🤑 Cupidité / Overtrading</option>
            <option value="revenge">😤 Revenge Trading</option>
            <option value="fomo">😱 FOMO</option>
            <option value="disciplined">💪 Discipliné</option>
            <option value="bored">😑 Ennui</option>
          </select>
        </div>

        <!-- Prix d'entrée -->
        <div>
          <label class="form-label">Prix d'entrée</label>
          <input id="tEntry" type="number" step="any" placeholder="1.08500" class="form-input"
            oninput="Trades.recalcPnL()" />
        </div>

        <!-- Prix de sortie -->
        <div>
          <label class="form-label">Prix de sortie</label>
          <input id="tExit" type="number" step="any" placeholder="1.09200" class="form-input"
            oninput="Trades.recalcPnL()" />
        </div>
      </div>

      <!-- P&L preview (auto-calculé) -->
      <div id="pnlPreview" class="hidden mt-4 p-4 rounded-xl bg-[#252840] border border-[#3e4276]"></div>

      <!-- Notes -->
      <div class="mt-3">
        <label class="form-label">Notes</label>
        <textarea id="tNotes" rows="2" placeholder="Setup, raison d'entrée, observations..." class="form-input resize-none"></textarea>
      </div>

      <!-- Image -->
      <div class="mt-3">
        <label class="form-label">Capture d'écran du graphique</label>
        <div id="dropzone" class="border-2 border-dashed border-[#2e3256] rounded-lg p-4 text-center cursor-pointer hover:border-brand transition">
          <p class="text-slate-400 text-sm">Glisser-déposer une image ou <span class="text-brand underline">cliquer</span></p>
          <input type="file" id="tImage" accept="image/*" class="hidden" onchange="Trades.handleImage(event)" />
          <img id="imagePreview" class="mt-3 max-h-40 mx-auto rounded hidden" />
        </div>
      </div>

      <div class="flex gap-3 mt-6 justify-end">
        <button onclick="App.closeModal('tradeModal')" class="btn-secondary">Annuler</button>
        <button onclick="Trades.save()" class="btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MODAL — Stratégie
  ════════════════════════════════════════════════════════ -->
  <div id="strategyModal" class="modal-backdrop hidden">
    <div class="modal-box w-[640px]">
      <h2 class="text-lg font-semibold modal-title mb-5">Fiche Stratégie</h2>
      <input type="hidden" id="stratId" />
      <div class="space-y-3">
        <div>
          <label class="form-label">Nom de la stratégie</label>
          <input id="stratName" type="text" placeholder="Ex: Smart Money Concepts" class="form-input" />
        </div>
        <div>
          <label class="form-label">Contenu (Markdown supporté)</label>
          <textarea id="stratContent" rows="10" placeholder="## Description&#10;&#10;Décris ta stratégie..." class="form-input resize-none font-mono text-sm"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6 justify-end">
        <button onclick="App.closeModal('strategyModal')" class="btn-secondary">Annuler</button>
        <button onclick="Strategies.saveCustom()" class="btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Scripts (ordre important) -->
  <script src="js/store.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/journals.js"></script>
  <script src="js/trades.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/journal-page.js"></script>
  <script src="js/strategies.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/economics.js"></script>
  <script src="js/notebook.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Helper modal journal — affiche/cache les champs selon le type
    const JournalModal = {
      onTypeChange() {
        const type = document.getElementById('jType').value;
        document.getElementById('propSection').classList.toggle('hidden', type !== 'prop');
      }
    };
  </script>
</body>
</html>
